[build]
  command = "npm run build"
  publish = "dist"

# SPA redirects - يوجه كل الطلبات لـ index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers أمان وأداء
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache للملفات الثابتة (CSS, JS, Images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"